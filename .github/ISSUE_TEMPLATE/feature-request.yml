name: "新功能提案"
description: "对已有功能的大幅度修改，或添加一个新内容或选项"
labels: ["新功能", "新提交"]
assignees: wengjinju
body:
  - type: checkboxes
    id: "checklist"
    attributes:
      label: "检查项"
      description: "请逐个检查下列项目，并勾选确认。"
      options:
        - label: "我已在 [Issues 页面](https://github.com/wengjinju/universal-wall/issues) 中搜索，确认了这一功能提案未被提交过。"
          required: true
        - label: "我已查看 [新功能投票页面](https://github.com/wengjinju/universal-wall/discussions/categories/%E6%96%B0%E5%8A%9F%E8%83%BD%E6%8A%95%E7%A5%A8)，确认了这一建议未在投票列表中。"
          required: true

  - type: textarea
    id: "description"
    attributes:
      label: "功能描述"
      description: "请详细描述你希望添加的新功能是什么，它能解决什么问题。"
    validations:
      required: true

  - type: textarea
    id: "implementation-details"
    attributes:
      label: "原因"
      description: "为什么要实现这个功能，可以在这里描述。"
    validations:
      required: true

  - type: textarea
    id: "alternatives"
    attributes:
      label: "替代方案（可选）"
      description: "你是否考虑过其他方式来解决这个问题？"
    validations:
      required: false

  - type: textarea
    id: "additional-notes"
    attributes:
      label: "补充说明"
      description: "在此处添加关于这个功能提案的其他背景信息。"
    validations:
      required: false
