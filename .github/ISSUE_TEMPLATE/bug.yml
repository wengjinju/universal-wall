name: "Bug"
about: "bug反馈"
labels: [bug, 新提交]
assignees: wengjinju

body:
- type: checkboxes
  id: "yml-1"
  attributes:
    label: "检查项"
    description: "请逐个检查下列项目，并勾选确认。"
    options:
    - label: "我已在 [Issues 页面](https://github.com/Meloong-Git/PCL/issues?q=is%3Aissue+) 和 [常见&难检反馈及问题列表](https://github.com/Meloong-Git/PCL/discussions/1930) 中搜索，确认了这一 Bug 未被提交过。"
      required: true
- type: textarea
  id: "yml-2"
  attributes:
    label: 描述
    description: "详细描述具体表现。"
  validations:
    required: true
- type: textarea
  id: "yml-3"
  attributes:
    label: PCL 错误报告、日志与附件
    description: "上传 PCL 提供的错误报告（在崩溃时选择导出错误报告）。如果没有，也可以上传 PCL 文件夹中的 Log1~5.txt。"
    placeholder: "先点击这个文本框，然后再将文件直接拖拽到文本框中以上传。"
  validations:
    required: true
- type: textarea
  id: "yml-4"
  attributes:
    label: HMCL 启动脚本
    description: "在 HMCL 中进入版本列表，点击版本右侧的三个点，选择 生成启动脚本。"
    placeholder: "先点击这个文本框，然后再将文件直接拖拽到文本框中以上传。"
  validations:
    required: false
      
**描述该错误**


**重现步骤**
重现该行为的步骤：
1. 
2.
3.
4. 

**预期行为**
对你期望发生的情况进行清晰简洁的描述。

**截图**
如适用，请添加截图以帮助说明您的问题。

**环境（请填写以下信息）：**
- 操作系统[例如：Windows]
- 浏览器[例如：chrome, safari]
- 版本[例如：1]

**附加上下文**
在此处添加有关问题的其他背景信息。
